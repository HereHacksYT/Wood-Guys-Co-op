<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Here Wars Mobile</title>
    <style>
        /* Telefon ekranında kaydırma ve çift tıklama yakınlaştırmasını kapatıyoruz */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            background-color: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Menü Konteyneri */
        #menu-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(20, 20, 20, 0.9);
            z-index: 2000;
            font-family: sans-serif;
            color: white;
        }

        #play-btn {
            display: none;
            padding: 15px 40px;
            font-size: 24px;
            background-color: #22c55e;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 0 #15803d;
        }

        #play-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #15803d;
        }

        #loading-text {
            font-size: 20px;
            color: #a8a29e;
        }

        /* Arayüz ve Kontroller */
        .joystick-zone {
            position: absolute;
            bottom: 30px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            z-index: 1000;
            display: none;
        }

        .joystick-stick {
            position: absolute;
            top: 30px; left: 30px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transition: transform 0.05s linear;
        }

        .action-btn {
            position: absolute;
            bottom: 45px;
            width: 70px;
            height: 70px;
            background: rgba(180, 140, 90, 0.7);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }

        /* Oyuncu 1 (Sol Taraf) */
        #p1-joystick-zone { left: 40px; }
        #p1-action-btn { left: 160px; }

        /* Oyuncu 2 (Sağ Taraf) */
        #p2-joystick-zone { right: 160px; }
        #p2-action-btn { right: 40px; }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1 style="margin-bottom: 20px;">HERE WARS</h1>
        <div id="loading-text">Modeller ve Harita Yükleniyor...</div>
        <button id="play-btn">BAŞLA</button>
    </div>

    <div id="p1-joystick-zone" class="joystick-zone"><div id="p1-joystick-stick" class="joystick-stick"></div></div>
    <div id="p1-action-btn" class="action-btn">ZIPLA</div>

    <div id="p2-joystick-zone" class="joystick-zone"><div id="p2-joystick-stick" class="joystick-stick"></div></div>
    <div id="p2-action-btn" class="action-btn">ZIPLA</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <script src="js/game.js"></script>
</body>
</html>
