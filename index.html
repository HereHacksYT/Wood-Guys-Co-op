<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Here Wars Mobile</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <style>
        /* TAHTA MENÜ ARAYÜZÜ STİLLERİ */
        #menu-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-family: Arial, sans-serif;
        }
        #loading-text {
            color: #fff;
            font-size: 24px;
            text-shadow: 2px 2px #000;
            margin-bottom: 20px;
        }
        #play-btn {
            display: none; /* Yükleme bitince açılacak */
            padding: 15px 40px;
            font-size: 28px;
            font-weight: bold;
            color: #5c3a21; /* Koyu Tahta Rengi Text */
            background-color: #d7a15c; /* Açık Renk Tahta Gövde */
            border: 6px solid #8b5a2b; /* Koyu Renk Tahta Çerçeve */
            border-radius: 12px;
            box-shadow: 0px 6px 0px #5c3a21, 0px 10px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            text-shadow: 1px 1px 0px #ffe4b5;
        }
        #play-btn:active {
            transform: translateY(4px);
            box-shadow: 0px 2px 0px #5c3a21, 0px 4px 10px rgba(0,0,0,0.5);
        }
        /* Bölüm Seçim Arayüzü */
        #level-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #d7a15c;
            border: 3px solid #8b5a2b;
            color: #5c3a21;
            padding: 5px 20px;
            font-weight: bold;
            font-size: 18px;
            border-radius: 8px;
            z-index: 50;
            display: none;
        }
        /* Dokunmatik kontroller oyun başlayana kadar gizli kalacak */
        .joystick-zone, .action-btn, #ui-container { display: none; }
    </style>
</head>
<body>

    <div id="menu-container">
        <div id="loading-text">Modeller Yükleniyor...</div>
        <button id="play-btn">PLAY</button>
    </div>

    <div id="level-indicator">BÖLÜM: <span id="level-num">1</span></div>

    <div id="ui-container">
        <div class="player-ui" id="p1-ui">
            <h2>Mavi Oyuncu</h2>
            <div class="health-bar"><div id="p1-health" style="width: 100%;"></div></div>
        </div>
        <div class="player-ui" id="p2-ui">
            <h2>Kırmızı Oyuncu</h2>
            <div class="health-bar"><div id="p2-health" style="width: 100%;"></div></div>
        </div>
    </div>

    <div id="p1-joystick-zone" class="joystick-zone bottom-left">
        <div class="joystick-base"><div id="p1-joystick-stick" class="joystick-stick"></div></div>
    </div>
    <button id="p1-action-btn" class="action-btn top-left-btn">VUR/ZIPLA</button>

    <div id="p2-joystick-zone" class="joystick-zone bottom-right">
        <div class="joystick-base"><div id="p2-joystick-stick" class="joystick-stick"></div></div>
    </div>
    <button id="p2-action-btn" class="action-btn top-right-btn">VUR/ZIPLA</button>

    <script src="js/game.js"></script>
</body>
</html>
