<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robot Guys Co-Op</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f0f1a;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* MENÜ */
        #menu-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e1e2f 0%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            text-align: center;
        }
        #progress-container {
            width: 280px;
            height: 16px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid #00ffcc;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 15px;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: #00ffcc;
            box-shadow: 0 0 10px #00ffcc;
            transition: width 0.1s ease;
        }
        #loading-text {
            font-size: 1rem;
            color: #a0a0b0;
            margin-top: 12px;
        }
        #play-btn {
            display: none;
            padding: 15px 45px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #10101e;
            background: #00ffcc;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
            margin-top: 25px;
        }

        /* MOBİL KONTROLLER */
        .joystick-zone {
            position: absolute;
            bottom: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: none;
            touch-action: none;
            z-index: 5;
        }
        #p1-joystick-zone { left: 40px; }
        #p2-joystick-zone { right: 40px; }

        .joystick-stick {
            position: absolute;
            top: 35px;
            left: 35px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            pointer-events: none;
        }

        .action-btn {
            position: absolute;
            bottom: 180px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5;
            touch-action: none;
        }
        #p1-action-btn {
            left: 65px;
            background: linear-gradient(135deg, #0055ff, #0033aa);
        }
        #p2-action-btn {
            right: 65px;
            background: linear-gradient(135deg, #ff2222, #aa0000);
        }

        /* UI – CAN ÇUBUKLARI */
        #ui-container {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 10;
        }
        .player-ui {
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 15px;
            border-radius: 8px;
            color: #fff;
            min-width: 120px;
            text-align: center;
            border: 2px solid #8B5A2B;
        }
        .player-ui h2 {
            margin: 0 0 5px 0;
            font-size: 12px;
        }
        .health-bar {
            width: 100%;
            height: 10px;
            background: #444;
            border-radius: 3px;
            overflow: hidden;
        }
        #p1-health {
            height: 100%;
            background: #00ff00;
            width: 100%;
        }
        #p2-health {
            height: 100%;
            background: #ff0000;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1>Robot Guys Co-Op</h1>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="loading-text">Başlatılıyor... (%0)</div>
        <button id="play-btn">OYNA</button>
    </div>

    <!-- UI Can Çubukları -->
    <div id="ui-container">
        <div class="player-ui">
            <h2>🔵 P1</h2>
            <div class="health-bar"><div id="p1-health"></div></div>
        </div>
        <div class="player-ui">
            <h2>🔴 P2</h2>
            <div class="health-bar"><div id="p2-health"></div></div>
        </div>
    </div>

    <!-- Mobil Kontroller -->
    <div id="p1-joystick-zone" class="joystick-zone">
        <div id="p1-joystick-stick" class="joystick-stick"></div>
    </div>
    <button id="p1-action-btn" class="action-btn">Zıpla</button>

    <div id="p2-joystick-zone" class="joystick-zone">
        <div id="p2-joystick-stick" class="joystick-stick"></div>
    </div>
    <button id="p2-action-btn" class="action-btn">Zıpla</button>

    <!-- Kütüphaneler -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <!-- Sıralama çok önemli! -->
    <script src="js/controls.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
