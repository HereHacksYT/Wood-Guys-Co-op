<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robot Guys Co-Op</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #11141a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ─── YÜKLEME VE MENÜ EKRANI ─── */
        #menu-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 20, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        h1 {
            color: #66ffcc;
            font-size: 42px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(102, 255, 204, 0.6);
            text-align: center;
        }

        #progress-container {
            width: 300px;
            height: 12px;
            background-color: #222831;
            border-radius: 6px;
            border: 2px solid #66ffcc;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 0 10px rgba(102, 255, 204, 0.2);
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: #66ffcc;
            transition: width 0.1s ease;
            box-shadow: 0 0 8px #66ffcc;
        }

        #loading-text {
            color: #a0aec0;
            font-size: 16px;
        }

        #play-btn {
            display: none;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            color: #11141a;
            background-color: #66ffcc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(102, 255, 204, 0.5);
            transition: transform 0.1s ease;
        }
        #play-btn:active {
            transform: scale(0.95);
        }

        /* ─── MOBİL DOKUNMATİK KONTROLLER ─── */
        .joystick-zone {
            position: absolute;
            bottom: 40px;
            width: 120px;
            height: 120px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: none;
            touch-action: none;
            z-index: 10;
        }
        #p1-joystick-zone { left: 40px; }
        #p2-joystick-zone { right: 40px; }

        .joystick-stick {
            position: absolute;
            top: 35px;
            left: 35px;
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            touch-action: none;
        }

        .action-btn {
            position: absolute;
            bottom: 180px;
            width: 70px;
            height: 70px;
            background-color: rgba(102, 255, 204, 0.3);
            border: 2px solid #66ffcc;
            border-radius: 50%;
            color: #66ffcc;
            font-weight: bold;
            font-size: 16px;
            display: none;
            justify-content: center;
            align-items: center;
            touch-action: none;
            z-index: 10;
            box-shadow: 0 0 10px rgba(102, 255, 204, 0.2);
        }
        #p1-action-btn { left: 65px; }
        #p2-action-btn { right: 65px; }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1 id="game-title">Robot Guys Co-Op</h1>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="loading-text">Bağlantı kuruluyor... (%0)</div>
        <button id="play-btn">OYNA</button>
    </div>

    <div id="p1-joystick-zone" class="joystick-zone">
        <div id="p1-joystick-stick" class="joystick-stick"></div>
    </div>
    <div id="p1-action-btn" class="action-btn">Zıpla</div>

    <div id="p2-joystick-zone" class="joystick-zone">
        <div id="p2-joystick-stick" class="joystick-stick"></div>
    </div>
    <div id="p2-action-btn" class="action-btn">Zıpla</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>

    <script src="js/game.js"></script>
</body>
</html>
