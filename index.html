<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robot Guys Co-Op</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* --- MENÜ VE YÜKLEME EKRANI --- */
        #menu-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e1e2f 0%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: #fff;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            color: #00ffcc;
            text-align: center;
        }
        #loading-text {
            font-size: 1.2rem;
            color: #888;
            animation: pulse 1.5s infinite ease-in-out;
        }
        #play-btn {
            display: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #10101e;
            background: #00ffcc;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
            transition: transform 0.2s, background 0.2s;
        }
        #play-btn:active {
            transform: scale(0.95);
            background: #00ccaa;
        }

        /* --- MOBİL KONTROLLER --- */
        .joystick-zone {
            position: absolute;
            bottom: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: none;
            touch-action: none;
            z-index: 5;
        }
        #p1-joystick-zone { left: 40px; }
        #p2-joystick-zone { right: 40px; }

        .joystick-stick {
            position: absolute;
            top: 35px;
            left: 35px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        /* --- AKSİYON / ZIPLAMA BUTONLARI --- */
        .action-btn {
            position: absolute;
            bottom: 180px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
            display: none;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            z-index: 5;
            touch-action: none;
        }
        #p1-action-btn {
            left: 65px;
            background: linear-gradient(135deg, #0055ff, #0033aa);
        }
        #p2-action-btn {
            right: 65px;
            background: linear-gradient(135deg, #ff2222, #aa0000);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1>Robot Guys Co-Op</h1>
        <div id="loading-text">Modeller Yükleniyor...</div>
        <button id="play-btn">OYNA</button>
    </div>

    <div id="p1-joystick-zone" class="joystick-zone">
        <div id="p1-joystick-stick" class="joystick-stick"></div>
    </div>
    <button id="p1-action-btn" class="action-btn">Zıpla</button>

    <div id="p2-joystick-zone" class="joystick-zone">
        <div id="p2-joystick-stick" class="joystick-stick"></div>
    </div>
    <button id="p2-action-btn" class="action-btn">Zıpla</button>

    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.0.6/build/cannon.min.js"></script>

    <script src="js/game.js"></script>
</body>
</html>
